name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: library_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run lint
        run: flake8 . --max-line-length=120 --exclude=migrations,venv

      - name: Run migrations and tests
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_URL: mysql://root:rootpassword@127.0.0.1:3306/library_db
        run: |
          python manage.py migrate
          python manage.py test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t library-management:latest .

      # To enable auto-deploy, add a deploy step here using your platform's
      # GitHub Action (e.g. Render/Railway deploy hook) and store secrets
      # like RENDER_DEPLOY_HOOK_URL in the repo's Settings > Secrets.
      # - name: Deploy
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
